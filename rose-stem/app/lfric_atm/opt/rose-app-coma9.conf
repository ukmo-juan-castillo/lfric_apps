cloud_call_b4_conv=.true.
fsd_conv_const=3.0
fsd_min_conv_frac=0.02
fsd_nonconv_ice_const=0.8
fsd_nonconv_liq_const=0.8
pc2_init_logic='smooth'

[namelist:convection]
