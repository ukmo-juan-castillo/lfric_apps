dcatch_dlai_io=0.27

[namelist:jules_pftparm(c3_grass)]
catch0_io=0.05
dcatch_dlai_io=0.73

[namelist:jules_pftparm(c4_grass)]
catch0_io=0.05
dcatch_dlai_io=0.71

[namelist:jules_pftparm(ndl_leaf)]
catch0_io=0.05
dcatch_dlai_io=0.44

[namelist:jules_pftparm(shrub)]
catch0_io=0.05
dcatch_dlai_io=1.0

[namelist:microphysics]
c_r_correl=0.7
ci_input=1.72e1
