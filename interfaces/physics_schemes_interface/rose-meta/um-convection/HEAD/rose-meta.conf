#==============================================================================
# CONVECTION:
#==============================================================================

[namelist:convection]
compulsory=true
description=Convection parametrization
ns=namelist/Science/UM Convection
sort-key=Section-A06
title=Convection

[namelist:convection=c_mass_sh]
compulsory=true
description=Cloud-base closure scaling for shallow convection
help=In the 6A shallow convection scheme, the cloud-base mass-flux is given by
    = Mb = c_mass_sh w*
    = where w* is the surface-flux-based convective velocity scale,
    = and c_mass_sh is an assumed cloud-base area fraction scaling.
    = The published version of the scheme has this set to 0.03.
!kind=double
range=0.01:0.09
sort-key=Panel-03j
type=real

[namelist:convection=cape_timescale]
compulsory=true
description=Timescale in seconds for CAPE closure scheme
help=This determines the e-folding time for the dissipation of CAPE.
    = There is some observational evidence for a timescale of the order of
    = an hour. The convection scheme seems to work better with a shorter CAPE
    = timescale of around half an hour (1800 secs).
!kind=default
range=1:9999999
sort-key=Panel-03
type=real

[namelist:convection=cca_md_scaling]
compulsory=true
description=Mid level convective cloud settings: CCA scaling
!kind=double
range=0:10
sort-key=Panel-03g
type=real

[namelist:convection=cpress_term]
compulsory=true
description=Coefficient for pressure term relative to shear term
           =in Gregory-Kershaw CMT
help=Coefficient for pressure term relative to shear term as in
    =Kershaw & Gregory 1997. GK1997 recommended a value of 0.7.
    =Controls the amount of momentum transferred from the
    =environment to the updraught parcel due to the horizontal
    =pressure gradient acting on the parcel. Larger values
    =transfer more momentum and hence reduce the difference
    =in winds between parcel and environment. 6a Only.
!kind=double
range=0.0:1.0
sort-key=Panel-03f
type=real

[namelist:convection=cv_scheme]
compulsory=true
description=Convection scheme
!enumeration=true
help=Convection scheme to use, options are:
    =GregoryRowntree  - UM 6A mass flux scheme
    =LambertLewis     - UM other convection scheme 10
    =Comorph          - ComorphA scheme
sort-key=Panel-01
trigger=namelist:convection=number_of_convection_substeps: 'gregory_rowntree';
       =namelist:convection=cape_timescale: 'gregory_rowntree';
       =namelist:convection=efrac: 'gregory_rowntree';
       =namelist:convection=prog_ent_grad: 'gregory_rowntree';
       =namelist:convection=prog_ent_int: 'gregory_rowntree';
       =namelist:convection=prog_ent_max: 'gregory_rowntree';
       =namelist:convection=prog_ent_min: 'gregory_rowntree';
       =namelist:convection=orig_mdet_fac: 'gregory_rowntree';
       =namelist:convection=r_det: 'gregory_rowntree';
       =namelist:convection=cca_md_scaling: 'gregory_rowntree';
       =namelist:convection=cpress_term: 'gregory_rowntree';
       =namelist:convection=ent_fac_sh: 'gregory_rowntree';
       =namelist:convection=thpixs_mid: 'gregory_rowntree';
       =namelist:convection=c_mass_sh: 'gregory_rowntree';
       =namelist:convection=l_conv_prog_dq: 'gregory_rowntree', 'comorph';
       =namelist:convection=l_conv_prog_dtheta: 'gregory_rowntree', 'comorph';
       =namelist:convection=par_gen_mass_fac: 'comorph';
       =namelist:convection=par_gen_rhpert: 'comorph';
       =namelist:convection=par_radius_ppn_max: 'comorph';
       =namelist:convection=resdep_precipramp: 'comorph';
value-titles=GregoryRowntree, LambertLewis, Comorph
values='gregory_rowntree','lambert_lewis','comorph'

[namelist:convection=dx_ref]
compulsory=true
description=Reference grid-length for Comorph A resolution-dependence / m
help=When using the resolution-dependent link between parcel radius
    =and precipitation rate, dx_ref is the grid-length at which the
    =namelist input value of par_radius_ppn_max applies.
    =Typically set to 50000.0m (ie. 50km).
!kind=default
range=100.0:1000000.0
sort-key=Panel-08
type=real

[namelist:convection=efrac]
compulsory=true
description=Evaporative fraction of fluxes at mid-level cloud base
help=This defines the ratio of latent heat flux to sensible plus latent
    = heat flux at mid-level cloud base due to the initial perturbation.
    = Only used if md_pert_opt=1 or 2. If md_pert_opt=2 then efrac just
    = sets the cloud base evaporative fracton away from the boundary
    = layer.
!kind=default
range=-10.0:10.0
sort-key=Panel-03b
type=real

[namelist:convection=ent_fac_sh]
compulsory=true
description=Controls shallow convection entrainment.
help=Factor multiplying entrainment expression.
    = Only applies to 6A convection.
!kind=double
range=0.33:3.00
sort-key=Panel-03i
type=real

[namelist:convection=l_conv_prog_dq]
compulsory=true
description=Applies time smoothing to the convective
           =humidity increment and activates the 3D prognostic
           =that holds the increment.
help=Applies time smoothing to the convective
    =humidity increment and activates the 3D
    =prognostic, conv_prog_dq, that holds the increment.
!kind=default
sort-key=Panel-09
type=logical

[namelist:convection=l_conv_prog_dtheta]
compulsory=true
description=Applies time smoothing to the convective potential
           =temperature increment and activates the 3D prognostic
           =that holds the increment.
help=Applies time smoothing to the convective
    =potential temperature increment and activates the 3D
    =prognostic, conv_prog_dtheta, that holds the increment.
!kind=default
sort-key=Panel-09
type=logical

[namelist:convection=l_cvdiag_ctop_qmax]
compulsory=true
description=Revised check for well-mixed q-profile in convective diagnosis.
help=In the convective diagnosis "cumulus test", use a revised
    =check for a well-mixed q-profile.  By default, grid-columns where
    =the mean vertical q-gradient between cloud-base and the parcel-top is
    =small are not allowed to diagnose cumulus.  But if this switch is on,
    =they are allowed if the gradient between cloud-base and any local
    =minimum q found below the parcel-top is larger.  This accounts for
    =occasions when the profile is not well-mixed, but contains a local
    =maximum q at cloud-top (due to strong detrainment there), with drier
    =air beneath.
!kind=default
sort-key=Panel-01
type=logical

[namelist:convection=llcs_first_outer]
compulsory=true
description=Run LLCS scheme on first outer iteration
help=As the first outer iteration of the dynamics is only providing an
    = approximate solution to the solver, we can speed the model up
    = by running the (cheaper) Lambert-Lewis scheme on the first outer
    = iteration, to give an approximate convection increment back to the
    = dynamics. The full scheme is run on the final outer iteration to
    = evolve the model state.
!kind=default
sort-key=Panel-01
type=logical

[namelist:convection=mparwtr]
compulsory=true
description=Maximum critical cloud condensate
help=Maximum Critical Cloud Condensate
    =
    = This sets the maximum value of the critical cloud condensate profile.
    = This is related to the option settings for
    = namelist:run_convection=ccw_for_precip_opt .
    = This will always be the maximum value for option 4.
    = mparwtr will always be used in options 0-3 but because of the
    = critical cloud depths (option 0) or other scalings (options 1-3)
    = it will not always directly equate to the maximum value of the
    = critical cloud condensate.
!kind=double
range=1e-5:1e-2
sort-key=Panel-03a
type=real

[namelist:convection=number_of_convection_substeps]
compulsory=true
description=Number of convection substeps per model time step
help=Normal set to 2 for Gregory Rowntree scheme when used in the UM.
    =Ideally we would prefer this as 1
    =Has been set higher than 2 by users trying to avoid UM instabilities
    =in the past. Not recommended as a solution to model instabilities.
!kind=default
range=1:5
sort-key=Panel-02
type=integer

[namelist:convection=orig_mdet_fac]
compulsory=true
description=Factor multiplying the original mixing detrainment rate.
help=Factor multiplying the original mixing detrainment rate.
    =Original default 1.0
!kind=default
range=0.0:5.0
sort-key=Panel-03d
type=real

[namelist:convection=par_gen_mass_fac]
compulsory=true
description=Coefficient scaling the initiating mass sources (dimensionless)
help=Higher values could mean that the layer-cloud in unstable environments
    =convects away more rapidly, leading to reduced layer-cloud in such
    =environments.
    =Recommended value 0.25
!kind=default
range=0.01:1.0
sort-key=Panel-04
type=real

[namelist:convection=par_gen_rhpert]
compulsory=true
description=Comorph neutrally-buoyant parcel initial RH perturbation (fractional)
help=Sets the magnitude of the "background" parcel initial moisture excess
    = in Relative Humidity (decimal fraction).
!kind=default
sort-key=Panel-05
type=real

[namelist:convection=par_radius_ppn_max]
compulsory=true
description=Comorph precip rate at which max parcel radius scaling occurs.
help=Scales the parcel initial radius, which determines the entrainment rate.
!kind=default
sort-key=Panel-06
type=real

[namelist:convection=prog_ent_grad]
compulsory=true
description=Gradient used to calculate entrainment scaling from prognostic field
help=Gradient term used to calculate entrainment scaling from
    = 3d prognostic field based on surface precipitation. Usually negative
    = because a greater precipitation implies smaller entrainment rates.
    = 6a scheme only. Used under ent_opt_md,ent_opt_dp=6 or 7 and needs
    = l_conv_prog_precip=T.
!kind=double
range=-3.0:0.0
sort-key=Panel-03c
type=real

[namelist:convection=prog_ent_int]
compulsory=true
description=Intercept used to calculate entrainment scaling from prognostic field
help=Intercept term used to calculate entrainment scaling from
    = 3d prognostic field based on surface precipitation.
    = 6a scheme only. Used under ent_opt_md,ent_opt_dp=6 or 7 and needs
    = l_conv_prog_precip=T.
!kind=double
range=-5.0:5.0
sort-key=Panel-03c
type=real

[namelist:convection=prog_ent_max]
compulsory=true
description=Maximum scaling when calculating entrainment from prognostic field
help=Maximum scaling applied when calculating entrainment scaling from
    = 3d prognostic field based on surface precipitation.
    = 6a scheme only. Used under ent_opt_md,ent_opt_dp=6 or 7 and needs
    = l_conv_prog_precip=T.
!kind=double
range=0.0:5.0
sort-key=Panel-03c
type=real

[namelist:convection=prog_ent_min]
compulsory=true
description=Minimum scaling when calculating entrainment from prognostic field
help=Minimum scaling applied when calculating entrainment scaling from
    = 3d prognostic field based on surface precipitation.
    = 6a scheme only. Used under ent_opt_md,ent_opt_dp=6 or 7 and needs
    = l_conv_prog_precip=T.
!kind=default
range=0.0:5.0
sort-key=Panel-03c
type=real

[namelist:convection=qlmin]
compulsory=true
description=Minimum critical cloud condensate
help=Minimum Critical Cloud Condensate
    =
    = This sets the minimum value of the critical cloud condensate profile.
    = This is related to the option settings for ccw_for_precip_opt.
    = This will always be applied for option 4 but will only be applied to
    = options 0-3 if PC2 is switched on.
!kind=default
range=0:1e-3
sort-key=Panel-03a
type=real

[namelist:convection=r_det]
compulsory=true
description=Adaptive detrainment control parameter
!kind=double
range=0:1
sort-key=Panel-03e
type=real

[namelist:convection=resdep_precipramp]
compulsory=true
description=Include grid-length dependence in Comorph A parcel radius precip ramp
help=Option to make the CoMorph A parcel radius dependence on the
    =precipitation rate a function of the grid size, and so allow for
    =the ability to resolve higher precip rates at higher resolution.
!kind=default
sort-key=Panel-07
trigger=namelist:convection=dx_ref: .true.;
type=logical

[namelist:convection=thpixs_mid]
compulsory=true
description=The initial mid-level parcel potential temperature perturbation (K)
help=The initial mid-level temperature perturbation prior to any scaling.
    =For md_pert_opt option 0 this just sets the temperature perturbation prior
    =to pressure scaling.
    =For md_pert_opt options 1 and 2 this ultimately results in a
    =buoyancy perturbation of thpixs_mid scaled with pressure thickness,
    =with the split between humidity and temperature being controlled via
    =the parameter efrac (options 1 and 2) and the surface fluxes (option 2).
!kind=double
range=0.0:2.0
sort-key=Panel-03h
type=real
